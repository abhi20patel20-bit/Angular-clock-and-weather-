<!-- Page wrapper keeps the clock centered on the screen -->
<div class="page">

  <!-- Main circular clock face -->
  <div class="clock">

    <!-- Decorative rings around the clock -->
    <div class="outer-ring"></div>
    <div class="inner-ring"></div>

    <!-- 60 tick marks around the clock face -->
    <div
      class="tick"
      *ngFor="let tick of ticks"
      [class.big]="tick % 5 === 0"
      [style.transform]="'rotate(' + tick * 6 + 'deg)'"
    ></div>

    <!-- Date display inside the clock -->
    <div class="date-pill">
      {{ currentDate }}
    </div>

    <!-- Weather display inside the clock -->
    <div class="weather-pill">
      <span class="weather-icon">☁</span>
      <span *ngIf="temperature() !== null">
        {{ temperature() }}°C
      </span>
    </div>

    <!-- Clock hands -->
    <div class="hand hour" [style.transform]="getHourRotation()"></div>
    <div class="hand minute" [style.transform]="getMinuteRotation()"></div>
    <div class="hand second" [style.transform]="getSecondRotation()"></div>

    <!-- Small circle in the middle of the clock -->
    <div class="center-dot"></div>

  </div>
</div>
